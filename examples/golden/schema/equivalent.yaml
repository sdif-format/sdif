kind: Schema
id: example.plan.v1
schema: sdif.schema.v1
authority: Canonical
lifecycle: Active
for_kind: Plan

fields:
  - name: kind
    type: Identifier
    required: true
    default: null
  - name: id
    type: Identifier
    required: true
    default: null
  - name: schema
    type: Identifier
    required: true
    default: null
  - name: authority
    type: "Enum(Canonical,Reference,Working,Derived,External,Unknown)"
    required: false
    default: Unknown
  - name: lifecycle
    type: "Enum(Draft,Active,Deprecated,Superseded,Archived,Quarantined)"
    required: false
    default: Draft
  - name: title
    type: String
    required: true
    default: null
  - name: status
    type: "Enum(open,closed,blocked)"
    required: true
    default: open
  - name: priority
    type: "Enum(P0,P1,P2,P3)"
    required: false
    default: P2