<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Markdown Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f6f7f9;
      color: #1f2937;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .toolbar a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .toolbar a:hover {
      text-decoration: underline;
    }

    .markdown-body {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      line-height: 1.65;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      line-height: 1.25;
      margin-top: 1.6em;
    }

    .markdown-body h1:first-child,
    .markdown-body h2:first-child,
    .markdown-body h3:first-child {
      margin-top: 0;
    }

    .markdown-body h1 {
      padding-bottom: 0.35em;
      border-bottom: 1px solid #e5e7eb;
    }

    .markdown-body code {
      background: #f1f5f9;
      padding: 0.15em 0.35em;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .markdown-body pre {
      background: #0f172a;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
    }

    .markdown-body pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5em 0;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid #e5e7eb;
      padding: 8px 12px;
      text-align: left;
    }

    .markdown-body th {
      background: #f8fafc;
    }

    .markdown-body blockquote {
      margin-left: 0;
      padding-left: 16px;
      border-left: 4px solid #cbd5e1;
      color: #475569;
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 8px;
    }

    .error {
      background: #fff1f2;
      color: #9f1239;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #fecdd3;
    }

    .server-note {
      background: #fffbeb;
      color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85em;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="toolbar">
      <a href="javascript:history.back()">← Back</a>
      <a id="raw-link" href="#">Open raw Markdown</a>
    </div>

    <p class="server-note" id="server-note">
      ⚠ fetch() requires a local server. Run: <code>python3 -m http.server 8000</code>
      and open <code>http://localhost:8000/dashboard.html</code>
    </p>

    <article id="content" class="markdown-body">
      Loading…
    </article>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");

    const content = document.getElementById("content");
    const rawLink = document.getElementById("raw-link");
    const serverNote = document.getElementById("server-note");

    function isSafeMarkdownPath(path) {
      return (
        path &&
        path.endsWith(".md") &&
        !path.includes("..") &&
        !path.startsWith("/") &&
        !path.startsWith("http://") &&
        !path.startsWith("https://")
      );
    }

    async function loadMarkdown() {
      if (!isSafeMarkdownPath(file)) {
        content.className = "error";
        content.textContent = "Invalid or missing file parameter.";
        rawLink.style.display = "none";
        return;
      }

      rawLink.href = file;

      if (location.protocol === "file:") {
        serverNote.style.display = "block";
      }

      try {
        const response = await fetch(file);

        if (!response.ok) {
          throw new Error(`Could not load ${file}: HTTP ${response.status}`);
        }

        const markdown = await response.text();
        const rawHtml = marked.parse(markdown);
        const safeHtml = DOMPurify.sanitize(rawHtml);

        content.className = "markdown-body";
        content.innerHTML = safeHtml;
        document.title = file.split("/").pop();
      } catch (error) {
        if (location.protocol === "file:") {
          serverNote.style.display = "block";
        }
        content.className = "error";
        content.textContent = error.message;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
