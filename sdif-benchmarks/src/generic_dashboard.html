<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDIF Benchmark Report</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --brand: #4338ca;
      --brand-light: #ede9fe;
      --brand-dark: #312e81;
      --success: #0f766e;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-soft: #334155;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    /* ---- Header ---- */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    .site-header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      gap: 1rem;
    }
    .site-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .site-title .badge {
      background: var(--brand-light);
      color: var(--brand-dark);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.04em;
    }
    .print-btn {
      font-size: 12px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px 10px;
      cursor: pointer;
    }
    .print-btn:hover { background: var(--surface-2); }

    /* ---- Tab nav ---- */
    .tab-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    .tab-nav-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }
    .tab-nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: -1px;
    }
    .tab-nav button.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }
    .tab-nav button:hover:not(.active) { color: var(--text); }

    /* ---- Main content ---- */
    #app {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 3rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ---- Typography ---- */
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.01em; }
    h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 2rem 0 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    h3 { font-size: 0.95rem; font-weight: 600; margin: 1.25rem 0 0.3rem; color: var(--text); }
    p { margin-bottom: 0.75rem; color: var(--text-soft); }
    ul, ol { margin: 0.4rem 0 0.75rem 1.4rem; color: var(--text-soft); }
    li { margin-bottom: 0.2rem; }
    strong { font-weight: 600; color: var(--text); }
    em { font-style: italic; }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Blockquote */
    blockquote {
      border-left: 3px solid var(--brand);
      padding: 0.5rem 1rem;
      margin: 0.75rem 0;
      background: var(--brand-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--brand-dark);
      font-size: 0.9rem;
    }
    blockquote p { color: var(--brand-dark); margin: 0; }

    /* ---- Code ---- */
    code {
      background: var(--surface-2);
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.85em;
      color: var(--text);
    }
    pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    pre code { background: none; padding: 0; font-size: 0.83em; }

    /* ---- Tables ---- */
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1.25rem;
      font-size: 0.88em;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    thead th {
      background: var(--surface-2);
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 0.82em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-soft);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--brand-light); }

    @media print {
      .site-header, .tab-nav, .print-btn { display: none; }
      .panel { display: block !important; }
      body { background: white; font-size: 12px; }
      table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <span class="site-title">
      SDIF Benchmark
      <span class="badge">Evidence</span>
    </span>
    <button class="print-btn" onclick="window.print()">Print / PDF</button>
  </div>
</header>

<div class="tab-nav">
  <div class="tab-nav-inner">
    <button class="active" onclick="show('summary', this)">Summary</button>
    <button onclick="show('detail', this)">Detail</button>
  </div>
</div>

<div id="app">
  <div id="summary" class="panel active"></div>
  <div id="detail" class="panel"></div>
</div>

<script type="application/json" id="report-data">__SDIF_REPORT_DATA_JSON__</script>
<script>
const summaryMd = __SDIF_SUMMARY_MD_JSON__;
const detailMd  = __SDIF_COMPARISON_MD_JSON__;

function show(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function mdToHtml(md) {
  let h = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^#{6}\s+(.+)$/gm, '<h6>$1</h6>')
    .replace(/^#{5}\s+(.+)$/gm, '<h5>$1</h5>')
    .replace(/^#{4}\s+(.+)$/gm, '<h4>$1</h4>')
    .replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_(.+?)_/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');

  // Blockquotes (must run before table)
  h = h.replace(/((?:^&gt;\s*.+\n?)+)/gm, block => {
    const inner = block.trim().split('\n').map(l => l.replace(/^&gt;\s*/, '')).join(' ');
    return `<blockquote><p>${inner}</p></blockquote>\n`;
  });

  // Tables
  h = h.replace(/((?:^\|.+\|\n)+)/gm, block => {
    const lines = block.trim().split('\n');
    if (lines.length < 2) return block;
    const header = lines[0].split('|').slice(1, -1).map(c => `<th>${c.trim()}</th>`).join('');
    const body = lines.slice(2).map(r =>
      '<tr>' + r.split('|').slice(1, -1).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>'
    ).join('\n');
    return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>\n`;
  });

  // Code blocks
  h = h.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')}</code></pre>`
  );

  // Lists
  h = h.replace(/((?:^[-*]\s.+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[-*]\s/, '')}</li>`).join('');
    return `<ul>${items}</ul>\n`;
  });
  h = h.replace(/((?:^\d+\.\s.+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '')}</li>`).join('');
    return `<ol>${items}</ol>\n`;
  });

  // Paragraphs
  h = h.split('\n\n').map(para => {
    para = para.trim();
    if (!para) return '';
    if (/^<[h1-6houpt]/.test(para)) return para;
    return `<p>${para.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  return h;
}

document.getElementById('summary').innerHTML = mdToHtml(summaryMd);
document.getElementById('detail').innerHTML   = mdToHtml(detailMd);

// Set document title from first h1
const h1 = document.querySelector('h1');
if (h1) document.title = `SDIF — ${h1.textContent}`;
</script>
</body>
</html>
