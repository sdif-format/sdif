[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sdif"
version = "0.2.1"
description = "Semantic Data Interchange Format - Formato semántico compacto, canonicalizable y eficiente en tokens"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "SDIF Contributors" }]
requires-python = ">=3.10"
keywords = ["sdif", "semantic-format", "canonicalization", "data-interchange", "ai", "llm", "validation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
]

[project.optional-dependencies]
dev = [
    "anthropic>=0.103.1",
    "pyyaml>=6.0.3",
    "tiktoken>=0.13.0",
    "transformers>=5.9.0",
    "pytest>=8.0",
    "ruff>=0.4",
    "PyYAML>=6.0",
]
bench = ["tiktoken>=0.8.0", "PyYAML>=6.0"]

[project.scripts]
sdif = "sdif.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py310"

[tool.black]
line-length = 100

[dependency-groups]
dev = [
    "huggingface-hub>=1.15.0",
    "pyyaml>=6.0.3",
    "sentencepiece>=0.2.1",
    "tiktoken>=0.13.0",
    "transformers>=5.9.0",
]
